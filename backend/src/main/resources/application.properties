# ─── Server ───────────────────────────────────────────────
server.port=9090
server.servlet.context-path=/weekendbasket

# ─── DataSource ───────────────────────────────────────────
# Values injected from environment variables (cloud) or application-local.properties (local dev)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
# Flyway owns DDL — Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# ─── Logging ──────────────────────────────────────────────
logging.config=classpath:log4j2.xml

# ─── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
# OTP login: 10 hours
jwt.expiration.ms=36000000
# Password login: 7 days
jwt.expiration.password.ms=604800000

# ─── OTP ──────────────────────────────────────────────────
otp.expiry.minutes=5
otp.max.attempts=3
# dev = log to console (default) | sns = send real SMS via AWS SNS
otp.provider=dev

# ─── AWS SNS (OTP SMS) ────────────────────────────────────────
# Required only when otp.provider=sns
# Free tier: 100 SMS/month forever. Beyond that: $0.02/SMS (~₹1.66)
aws.access.key.id=${AWS_ACCESS_KEY_ID:not-configured}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY:not-configured}
aws.sns.region=${AWS_SNS_REGION:ap-south-1}

# ─── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,mappings
management.endpoint.health.show-details=always

# ─── Schedulers ───────────────────────────────────────────
scheduler.cycle.open.cron=0 0 0 * * MON
scheduler.cycle.close.cron=0 0 14 * * WED
scheduler.token.cleanup.cron=0 0 2 * * *
scheduler.otp.cleanup.cron=0 30 2 * * *

# ─── CORS ────────────────────────────────────────────────
# Comma-separated list of allowed origins
# Dev default: localhost:4200 | Prod: set CORS_ALLOWED_ORIGINS in Render env vars
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ─── Rate Limiting ────────────────────────────────────────
# send-otp: max per phone number per window
ratelimit.otp.max-requests=3
ratelimit.otp.window-minutes=10
# general IP-based limit for all public endpoints
ratelimit.ip.max-requests=30
ratelimit.ip.window-minutes=1
